name: Extension Debug Tests (Playwright)

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, feature/**]

jobs:
  debug-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install extension dependencies
      run: |
        cd extension
        npm ci

    - name: Build extension
      run: |
        cd extension
        npm run pack

    - name: Install Playwright browsers
      run: |
        cd extension
        npx playwright install chromium

    - name: Run ONLY debug tests
      env:
        E2E_HEADLESS: 'true'
      run: |
        cd extension
        npx playwright test tests/debug.spec.js