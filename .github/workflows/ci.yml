name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main, feature/** ]

jobs:
  backend-tests:
    uses: ./.github/workflows/backend-tests.yml

  extension-tests:
    uses: ./.github/workflows/extension-tests.yml

  status-check:
    needs: [ backend-tests, extension-tests ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" || "${{ needs.extension-tests.result }}" == "failure" ]]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed"
