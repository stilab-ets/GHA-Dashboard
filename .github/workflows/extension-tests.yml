name: Extension Tests (Playwright)

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
   branches: [ main, feature/** ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Install Playwright browsers
      run: |
        cd extension
        npx playwright install chromium

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Create .env file
      run: |
        cd backend
        echo "TEST_GITHUB_TOKEN=${{ secrets.TEST_GITHUB_TOKEN }}" >> .env
        echo "TEST_GITHUB_USERNAME=${{ secrets.TEST_GITHUB_USERNAME }}" >> .env
        echo "CHROME_EXTENSION_ID=${{ secrets.CHROME_EXTENSION_ID }}" >> .env

    - name: Start backend e2e
      run: |
        cd backend
        python app.py --e2e &

        # Wait for the backend to be ready before running tests
        backend_ready=false
        for i in {1..30}; do
          if curl -s http://localhost:3000/health > /dev/null 2>&1; then
            echo "Backend is ready"
            backend_ready=true
            break
          fi
          echo "Waiting for backend... ($i/30)"
          sleep 1
        done

        if [ "$backend_ready" != "true" ]; then
          echo "Backend failed to start within 30 seconds"
          exit 1
        fi

    - name: Install Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run E2E tests
      run: |
        cd extension
        xvfb-run --server-args="-screen 0 1920x1080x24" -a npm run test:e2e

    - name: Run unit tests
      run: |
        cd extension
        npm run test:unit
